<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#CC0000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pokédex">
<link rel="manifest" href="/pokedex/manifest.json">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
<title>Pokédex Nacional</title>
<style>
  :root{
    --red:#CC0000;--darkred:#990000;--yellow:#FFDD00;--blue:#3399FF;
    --app-w: min(100vw, 480px);
    --app-h: 100dvh;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:#1a1a2e;display:flex;justify-content:center;align-items:stretch;font-family:'Courier New',monospace;color:white}

  #app{
    width:var(--app-w);
    height:var(--app-h);
    background:var(--red);
    box-shadow:0 0 40px rgba(0,0,0,.8),inset 0 2px 4px rgba(255,255,255,.2);
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    border:2px solid var(--darkred);
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* En pantallas grandes (escritorio) mantener forma redondeada de Pokédex */
  @media (min-width: 481px) {
    body { align-items:center; padding:20px 0; }
    #app{
      max-height: 700px;
      border-radius:20px 20px 50px 20px;
      border-width:3px;
    }
  }

  /* TOP */
  .top{background:var(--red);padding:14px 16px 10px;flex-shrink:0;position:relative}
  .top::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:4px;background:var(--darkred);z-index:5}
  .top-deco{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .big-eye{width:clamp(40px,11vw,52px);aspect-ratio:1;background:radial-gradient(circle at 35% 35%,#aaddff,#0055cc 60%,#003388);border-radius:50%;border:4px solid white;box-shadow:0 0 0 3px #333,0 3px 8px rgba(0,0,0,.5);flex-shrink:0}
  .smls{display:flex;gap:6px}
  .sml{width:14px;height:14px;border-radius:50%;border:2px solid rgba(0,0,0,.3)}
  .sml.r{background:radial-gradient(circle at 35% 35%,#ff9999,#cc0000)}
  .sml.y{background:radial-gradient(circle at 35% 35%,#ffff99,#ccaa00)}
  .sml.g{background:radial-gradient(circle at 35% 35%,#99ff99,#00aa00)}
  .screen-wrap{background:#222;border-radius:8px;padding:6px;border:2px solid #111}
  .screen{background:#88cc88;border-radius:4px;min-height:60px;padding:8px;font-size:clamp(10px,2.8vw,12px);color:#115511;text-align:center;display:flex;align-items:center;justify-content:center}

  /* BOTTOM */
  .bottom{
    flex:1;
    background:var(--red);
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    min-height:0;
  }

  .nav-buttons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex-shrink:0}
  .nav-btn{background:var(--darkred);border:none;border-radius:8px;color:white;font-family:inherit;font-size:clamp(9px,2.5vw,11px);font-weight:bold;padding:10px 4px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;border-bottom:3px solid #660000;transition:all .1s}
  .nav-btn:active{transform:translateY(2px);border-bottom-width:1px}
  .nav-btn.active{background:var(--yellow);color:#111;border-bottom-color:#aa8800}

  .content{
    background:#1a1a1a;
    border-radius:12px;
    padding:12px;
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    border:2px solid #111;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:thin;
    scrollbar-color:var(--red) #333;
  }
  .content::-webkit-scrollbar{width:6px}
  .content::-webkit-scrollbar-track{background:#333}
  .content::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px}

  /* CAPTURE */
  .capture-area{display:flex;flex-direction:column;gap:10px}
  .cap-btn{background:linear-gradient(135deg,#333,#555);border:2px solid #666;border-radius:10px;color:white;font-family:inherit;font-size:clamp(11px,3vw,13px);padding:14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;width:100%;text-align:left}
  .cap-btn:active{border-color:var(--yellow);transform:scale(0.98)}
  .cap-icon{font-size:clamp(20px,5vw,24px)}
  .poke-result{display:none;background:#222;border-radius:10px;overflow:hidden;border:1px solid #444}
  .poke-result.show{display:block}
  .poke-hdr{background:var(--red);padding:8px 10px;font-size:clamp(10px,2.8vw,12px);color:white;text-align:center;font-weight:bold;letter-spacing:1px}
  .poke-body{display:flex}
  .poke-img-col{width:40%;max-width:140px;flex-shrink:0;background:#1a3a1a;display:flex;align-items:center;justify-content:center;padding:8px;min-height:130px}
  .poke-img-col img{width:100%;max-height:130px;object-fit:contain}
  .poke-info-col{flex:1;padding:10px;display:flex;flex-direction:column;gap:5px;min-width:0}
  .poke-name{font-size:clamp(13px,3.5vw,16px);font-weight:bold;color:var(--yellow);text-transform:uppercase;word-break:break-word}
  .poke-num{font-size:clamp(9px,2.5vw,11px);color:#aaa}
  .poke-genre{font-size:clamp(9px,2.5vw,11px);color:#ccc;font-style:italic}
  .poke-types{display:flex;gap:4px;flex-wrap:wrap;margin:2px 0}
  .tb{padding:3px 7px;border-radius:4px;font-size:clamp(8px,2.2vw,10px);font-weight:bold;color:white;text-transform:uppercase}
  .poke-desc{font-size:clamp(9px,2.5vw,11px);color:#bbb;line-height:1.4;margin-top:4px}
  .speak-btn{background:var(--blue);border:none;border-radius:6px;color:white;font-size:clamp(9px,2.5vw,11px);padding:6px 10px;cursor:pointer;margin-top:4px;font-family:inherit;width:fit-content}
  .save-btn{background:#116611;border:none;border-radius:6px;color:white;font-size:clamp(9px,2.5vw,11px);padding:8px 10px;cursor:pointer;margin-top:6px;font-family:inherit;width:100%;font-weight:bold}
  .save-btn:disabled{background:#555;cursor:default}
  .loading-poke{text-align:center;color:var(--yellow);padding:20px;display:none;flex-direction:column;align-items:center;gap:10px;font-size:clamp(10px,2.8vw,12px)}
  .loading-poke.show{display:flex}
  .spinner{width:36px;height:36px;border:3px solid #333;border-top:3px solid var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* LIST */
  .poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:5px}
  .poke-cell{background:#222;border:1px solid #333;border-radius:6px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;overflow:hidden;position:relative}
  .poke-cell:active{border-color:var(--yellow);transform:scale(0.95)}
  .poke-cell .num{font-size:clamp(7px,1.8vw,9px);color:#666;position:absolute;top:2px;left:3px;font-weight:bold}
  .poke-cell img{width:75%;height:75%;object-fit:contain}
  .poke-cell .question{font-size:clamp(20px,5vw,26px);opacity:.5;color:#aaa}
  .poke-cell.captured{border-color:#226622;background:#112211}
  .pagination{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
  .page-btn{background:#333;border:1px solid #555;color:white;border-radius:4px;font-size:clamp(9px,2.5vw,11px);padding:4px 9px;cursor:pointer;font-family:inherit;min-width:30px}
  .page-btn.active{background:var(--red);border-color:var(--red)}
  .sec-title{color:var(--yellow);font-size:clamp(12px,3.2vw,14px);font-weight:bold;text-align:center;margin-bottom:10px;letter-spacing:2px;text-transform:uppercase}
  .gen-filter{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:10px}
  .gen-btn{background:#333;border:1px solid #555;color:#aaa;border-radius:4px;font-size:clamp(8px,2.2vw,10px);padding:4px 8px;cursor:pointer;font-family:inherit;min-width:32px;font-weight:bold}
  .gen-btn.active{background:var(--red);border-color:var(--red);color:white}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.9);z-index:100;padding:20px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .modal-overlay.show{display:flex;align-items:flex-start;justify-content:center}
  .modal-box{background:#1a1a1a;border-radius:12px;border:2px solid var(--red);overflow:hidden;width:100%;max-width:380px;margin-top:30px}
  .modal-close{background:var(--red);border:none;color:white;font-size:clamp(10px,2.8vw,12px);padding:10px 12px;cursor:pointer;font-family:inherit;display:block;width:100%;font-weight:bold}

  /* OPTIONS */
  .options-area{display:flex;flex-direction:column;gap:10px}
  .opt-group{background:#222;border-radius:8px;padding:12px;border:1px solid #333}
  .opt-label{font-size:clamp(9px,2.5vw,11px);color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;font-weight:bold}
  select,input[type=text]{background:#333;border:1px solid #555;border-radius:6px;color:white;font-family:inherit;font-size:clamp(10px,2.8vw,12px);padding:8px 10px;width:100%}
  .api-row{display:flex;gap:6px}
  .api-row input{flex:1;min-width:0}
  .api-save{background:var(--blue);border:none;border-radius:6px;color:white;font-size:clamp(9px,2.5vw,11px);padding:8px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;font-weight:bold}
  .stat-row{display:flex;justify-content:space-between;font-size:clamp(10px,2.8vw,12px);color:#aaa;margin:4px 0}
  .stat-val{color:var(--yellow);font-weight:bold}
  .placeholder-msg{background:#1a1a2e;border-radius:6px;padding:10px;font-size:clamp(9px,2.5vw,11px);color:#666;text-align:center;border:1px dashed #333;font-style:italic}
  .install-btn{background:linear-gradient(135deg,#00aa44,#008833);border:none;border-radius:6px;color:white;font-size:clamp(10px,2.8vw,12px);padding:10px;cursor:pointer;font-family:inherit;width:100%;font-weight:bold;margin-top:6px;display:none}
  .install-btn.show{display:block}

  /* CONFIRM */
  .confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;padding:20px}
  .confirm-overlay.show{display:flex}
  .confirm-box{background:#222;border-radius:12px;border:2px solid var(--yellow);padding:18px;width:100%;max-width:320px;text-align:center}
  .confirm-msg{color:white;font-size:clamp(11px,3vw,13px);margin-bottom:14px;line-height:1.5;white-space:pre-line}
  .confirm-btns{display:flex;gap:10px;justify-content:center}
  .confirm-btn{border:none;border-radius:8px;font-family:inherit;font-size:clamp(10px,2.8vw,12px);padding:10px 18px;cursor:pointer;font-weight:bold}
  .confirm-ok{background:var(--red);color:white}
  .confirm-cancel{background:#444;color:white}

  .msg-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--yellow);color:#111;border-radius:8px;padding:10px 16px;font-size:clamp(10px,2.8vw,12px);font-weight:bold;text-align:center;z-index:300;display:none;animation:slideUp .3s ease;max-width:90vw;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .msg-bar.show{display:block}
  @keyframes slideUp{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

  /* TYPE COLORS */
  .t-fuego{background:#ff5533}.t-agua{background:#3399ff}.t-planta{background:#44aa44}
  .t-electrico{background:#ffcc00;color:#333}.t-psiquico{background:#ff77aa}
  .t-hielo{background:#66ccff}.t-dragon{background:#7755ff}.t-siniestro{background:#554433}
  .t-acero{background:#9999aa}.t-hada{background:#ffaacc;color:#333}.t-lucha{background:#bb3322}
  .t-veneno{background:#aa5599}.t-tierra{background:#ddbb55;color:#333}.t-volador{background:#8899ff}
  .t-bicho{background:#aabb22;color:#333}.t-roca{background:#bbaa66;color:#333}.t-fantasma{background:#665577}
  .t-normal{background:#888888}
</style>
</head>
<body>
<div id="app">
  <div class="top">
    <div class="top-deco">
      <div class="big-eye"></div>
      <div class="smls">
        <div class="sml r"></div><div class="sml y"></div><div class="sml g"></div>
      </div>
    </div>
    <div class="screen-wrap">
      <div class="screen"><div id="top-screen">☆ POKÉDEX NACIONAL v2.0 ☆</div></div>
    </div>
  </div>

  <div class="bottom">
    <div class="nav-buttons">
      <button class="nav-btn active" id="nav-capture" onclick="showSection('capture')">📷 CAPTURAR</button>
      <button class="nav-btn" id="nav-list" onclick="showSection('list')">📋 LISTADO</button>
      <button class="nav-btn" id="nav-options" onclick="showSection('options')">⚙️ OPCIONES</button>
    </div>
    <div class="content" id="main-content"></div>
  </div>

  <input type="file" id="inp-cam"  accept="image/*" capture="environment" style="display:none">
  <input type="file" id="inp-file" accept="image/*" style="display:none">

  <div class="modal-overlay" id="modal"><div class="modal-box" id="modal-box"></div></div>
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-msg" id="confirm-msg"></div>
      <div class="confirm-btns">
        <button class="confirm-btn confirm-ok" id="confirm-ok">Sí, borrar</button>
        <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">Cancelar</button>
      </div>
    </div>
  </div>
  <div class="msg-bar" id="msg-bar"></div>
</div>

<script>
// ===== SERVICE WORKER PARA PWA INSTALABLE =====
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE_NAME = 'pokedex-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => {
      e.respondWith(
        fetch(e.request).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(e => console.log('SW no disponible:', e));
}

// Captura del evento de instalación PWA
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('install-pwa-btn');
  if (btn) btn.classList.add('show');
});

// ===== ESTADO =====
const STATE = {
  get geminiKey(){ return localStorage.getItem('pdx_key')||'' },
  set geminiKey(v){ localStorage.setItem('pdx_key',v) },
  get captured(){ try{ return JSON.parse(localStorage.getItem('pdx_cap')||'{}') }catch(e){ return {} } },
  set captured(v){ localStorage.setItem('pdx_cap',JSON.stringify(v)) },
  section:'capture', listPage:0, genFilter:'all', pendingResult:null, busy:false
};

const TOTAL=1025, PAGE_SIZE=64;
const GENS={'I':[1,151],'II':[152,251],'III':[252,386],'IV':[387,493],'V':[494,649],'VI':[650,721],'VII':[722,809],'VIII':[810,905],'IX':[906,1025]};
const SCREENS={capture:'📷 Escanear Pokémon',list:'📋 Pokémon Registrados',options:'⚙️ Configuración'};

// Inputs fijos — listener UNA SOLA VEZ
document.getElementById('inp-cam').addEventListener('change', function(){
  if(this.files && this.files[0]){ handleImage(this.files[0]); this.value=''; }
});
document.getElementById('inp-file').addEventListener('change', function(){
  if(this.files && this.files[0]){ handleImage(this.files[0]); this.value=''; }
});

// ===== UTILS =====
function showMsg(txt,dur=2500){
  const b=document.getElementById('msg-bar');
  b.textContent=txt; b.classList.add('show');
  clearTimeout(b._t); b._t=setTimeout(()=>b.classList.remove('show'),dur);
}
function safeText(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;') }
function numPad(n){ return String(n).padStart(3,'0') }
function typeClass(t){ return 't-'+String(t).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-') }
function typeBadges(types){ return (types||[]).map(t=>`<span class="tb ${typeClass(t)}">${safeText(t)}</span>`).join('') }
function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('No se pudo leer el archivo'));
    r.readAsDataURL(file);
  });
}

function showSection(s){
  STATE.section=s;
  ['capture','list','options'].forEach(n=>document.getElementById('nav-'+n).classList.toggle('active',n===s));
  document.getElementById('top-screen').innerHTML=`☆ ${SCREENS[s]} ☆`;
  ({capture:renderCapture,list:renderList,options:renderOptions})[s]();
}

// ===== CAPTURAR =====
function renderCapture(){
  document.getElementById('main-content').innerHTML=`
    <div class="capture-area">
      <div style="color:#888;font-size:clamp(9px,2.5vw,11px);text-align:center;margin-bottom:4px;">Fotografía o sube una imagen de un Pokémon</div>
      <button class="cap-btn" id="btn-cam">
        <span class="cap-icon">📷</span>
        <div><div style="font-weight:bold">CÁMARA</div><div style="font-size:clamp(9px,2.5vw,11px);color:#aaa">Hacer foto ahora</div></div>
      </button>
      <button class="cap-btn" id="btn-file">
        <span class="cap-icon">🖼️</span>
        <div><div style="font-weight:bold">GALERÍA</div><div style="font-size:clamp(9px,2.5vw,11px);color:#aaa">Subir imagen</div></div>
      </button>
      <div class="loading-poke" id="loading-poke"><div class="spinner"></div><div id="load-msg">Analizando...</div></div>
      <div class="poke-result" id="poke-result"></div>
    </div>`;
  document.getElementById('btn-cam').onclick  = ()=>{ if(!STATE.busy) document.getElementById('inp-cam').click(); };
  document.getElementById('btn-file').onclick = ()=>{ if(!STATE.busy) document.getElementById('inp-file').click(); };
}

async function handleImage(file){
  if(STATE.busy) return;
  if(!STATE.geminiKey){ showMsg('⚠️ Introduce tu API Key de Gemini en Opciones',3000); return; }
  STATE.busy = true;

  const prevResult=document.getElementById('poke-result');
  if(prevResult){ prevResult.classList.remove('show'); prevResult.innerHTML=''; }
  STATE.pendingResult=null;

  let b64;
  try{ b64=await toBase64(file); }
  catch(e){ showMsg('Error leyendo imagen: '+e.message,3000); STATE.busy=false; return; }

  setLoading(true,'Escaneando Pokémon...');
  try{
    const data=await identifyWithGemini(b64, file.type||'image/jpeg');
    setLoading(false);
    if(data && data.id) await renderResult(data);
    else showMsg('No se detectó ningún Pokémon 🔍',3000);
  }catch(e){
    setLoading(false);
    showMsg('Error: '+e.message,5000);
  }
  STATE.busy=false;
}

function setLoading(show,msg){
  const el=document.getElementById('loading-poke'); if(!el) return;
  el.classList.toggle('show',show);
  if(msg){ const lm=document.getElementById('load-msg'); if(lm) lm.textContent=msg; }
}

async function identifyWithGemini(b64, mime){
  const prompt=`Analiza esta imagen y determina qué Pokémon aparece.
Responde SOLO con un objeto JSON válido, sin bloques de código ni texto adicional:
{"id":número_entero,"name":"nombre en español","types":["tipo1"],"genus":"subgénero (ej: Pokémon Ratón)","description":"descripción breve en español de 2-3 frases estilo Pokédex"}
Si no hay ningún Pokémon reconocible responde exactamente: {"id":0}`;

  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${STATE.geminiKey}`;
  const resp=await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {text:prompt},
        {inline_data:{mime_type:mime, data:b64}}
      ]}],
      generationConfig:{temperature:0.1, maxOutputTokens:1000}
    })
  });
  if(!resp.ok){
    const err=await resp.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${resp.status}`);
  }
  const data=await resp.json();
  const txt=(data.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
  const start=txt.indexOf('{'), end=txt.lastIndexOf('}');
  if(start===-1||end===-1||end<=start) throw new Error('Respuesta JSON inválida de Gemini');
  return JSON.parse(txt.slice(start,end+1));
}

async function renderResult(data){
  setLoading(true,'Cargando datos oficiales...');
  let sprite=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/other/official-artwork/${data.id}.png`;
  let officialName=data.name;
  try{
    const pr=await fetch(`https://pokeapi.co/api/v2/pokemon/${data.id}`);
    if(pr.ok){
      const pd=await pr.json();
      const oa=pd.sprites?.other?.['official-artwork']?.front_default;
      if(oa) sprite=oa;
    }
    const sr=await fetch(`https://pokeapi.co/api/v2/pokemon-species/${data.id}`);
    if(sr.ok){
      const sd=await sr.json();
      const esName=sd.names?.find(n=>n.language.name==='es');
      if(esName) officialName=esName.name;
    }
  }catch(e){}
  data.name=officialName;
  STATE.pendingResult={...data,sprite};
  setLoading(false);

  const el=document.getElementById('poke-result'); if(!el) return;
  const num=numPad(data.id);
  const saved=!!STATE.captured[data.id];
  el.innerHTML=`
    <div class="poke-hdr">Nº ${num} — ${safeText(officialName.toUpperCase())}</div>
    <div class="poke-body">
      <div class="poke-img-col"><img id="poke-sprite" src="${safeText(sprite)}" alt="${safeText(officialName)}"></div>
      <div class="poke-info-col">
        <div class="poke-name">${safeText(officialName)}</div>
        <div class="poke-num">#${num}</div>
        <div class="poke-genre">${safeText(data.genus)}</div>
        <div class="poke-types">${typeBadges(data.types)}</div>
        <div class="poke-desc">${safeText(data.description)}</div>
        <button class="speak-btn" id="speak-btn">🔊 Leer</button>
        <button class="save-btn" id="save-btn" ${saved?'disabled':''}>
          ${saved?'✔ YA REGISTRADO':'✚ REGISTRAR EN POKÉDEX'}
        </button>
      </div>
    </div>`;
  el.classList.add('show');
  document.getElementById('poke-sprite').onerror=function(){
    this.onerror=null;
    this.src=`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${data.id}.png`;
  };
  document.getElementById('speak-btn').onclick=()=>speakDesc(data.description||'');
  document.getElementById('save-btn').onclick=savePending;
}

function savePending(){
  const p=STATE.pendingResult; if(!p||!p.id) return;
  const all=STATE.captured;
  all[p.id]={name:p.name,types:p.types,genus:p.genus,desc:p.description,sprite:p.sprite};
  STATE.captured=all;
  const btn=document.getElementById('save-btn');
  if(btn){btn.textContent='✔ REGISTRADO';btn.disabled=true;}
  showMsg(`¡${p.name} registrado! (#${numPad(p.id)})`);
}

// ===== LISTADO =====
function renderList(){
  let start=1,end=TOTAL;
  if(STATE.genFilter!=='all')[start,end]=GENS[STATE.genFilter];
  const totalPages=Math.ceil((end-start+1)/PAGE_SIZE);
  if(STATE.listPage>=totalPages) STATE.listPage=0;
  const pStart=start+STATE.listPage*PAGE_SIZE;
  const pEnd=Math.min(pStart+PAGE_SIZE-1,end);
  const cap=STATE.captured;

  const genBtns=['all','I','II','III','IV','V','VI','VII','VIII','IX'].map(g=>
    `<button class="gen-btn ${STATE.genFilter===g?'active':''}" data-gen="${g}">${g==='all'?'ALL':g}</button>`
  ).join('');

  let cells='';
  for(let i=pStart;i<=pEnd;i++){
    const p=cap[i];
    cells+=`<div class="poke-cell ${p?'captured':''}" data-pokeid="${i}">
      <span class="num">${numPad(i)}</span>
      ${p?`<img src="${safeText(p.sprite)}" alt="${safeText(p.name)}" loading="lazy">`:'<span class="question">?</span>'}
    </div>`;
  }

  let pageBtns='';
  for(let p=0;p<totalPages;p++)
    pageBtns+=`<button class="page-btn ${p===STATE.listPage?'active':''}" data-page="${p}">${p+1}</button>`;

  const count=Object.keys(cap).length;
  document.getElementById('main-content').innerHTML=`
    <div class="sec-title">📋 POKÉDEX NACIONAL</div>
    <div style="text-align:center;font-size:clamp(9px,2.5vw,11px);color:#888;margin-bottom:8px;">${count} / ${TOTAL} capturados</div>
    <div class="gen-filter" id="gen-filter">${genBtns}</div>
    <div class="poke-grid" id="poke-grid">${cells}</div>
    <div class="pagination" id="pagination">${pageBtns}</div>`;

  document.getElementById('gen-filter').addEventListener('click',e=>{
    const b=e.target.closest('[data-gen]'); if(b){STATE.genFilter=b.dataset.gen;STATE.listPage=0;renderList();}
  });
  document.getElementById('poke-grid').addEventListener('click',e=>{
    const c=e.target.closest('[data-pokeid]'); if(c) openModal(Number(c.dataset.pokeid));
  });
  document.getElementById('pagination').addEventListener('click',e=>{
    const b=e.target.closest('[data-page]'); if(b){STATE.listPage=Number(b.dataset.page);renderList();}
  });
}

function openModal(id){
  const p=STATE.captured[id]; if(!p) return;
  const num=numPad(id);
  document.getElementById('modal-box').innerHTML=`
    <button class="modal-close" id="modal-close-btn">✕ CERRAR</button>
    <div class="poke-hdr">Nº ${num} — ${safeText(p.name.toUpperCase())}</div>
    <div class="poke-body">
      <div class="poke-img-col" style="min-height:160px"><img src="${safeText(p.sprite)}" alt="${safeText(p.name)}" style="max-height:150px"></div>
      <div class="poke-info-col">
        <div class="poke-name">${safeText(p.name)}</div>
        <div class="poke-num">#${num}</div>
        <div class="poke-genre">${safeText(p.genus||'')}</div>
        <div class="poke-types">${typeBadges(p.types)}</div>
        <div class="poke-desc">${safeText(p.desc||'')}</div>
        <button class="speak-btn" id="modal-speak">🔊 Leer descripción</button>
      </div>
    </div>`;
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal-close-btn').onclick=closeModal;
  document.getElementById('modal-speak').onclick=()=>speakDesc(p.desc||'');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

// ===== OPCIONES =====
function renderOptions(){
  const count=Object.keys(STATE.captured).length;
  const isInstalled = window.matchMedia('(display-mode: standalone)').matches;
  document.getElementById('main-content').innerHTML=`
    <div class="options-area">
      <div class="opt-group">
        <div class="opt-label">📱 INSTALAR APP</div>
        ${isInstalled
          ? '<div style="font-size:clamp(10px,2.8vw,12px);color:#44aa44;">✔ App instalada</div>'
          : `<div style="font-size:clamp(9px,2.5vw,11px);color:#888;margin-bottom:6px;">Instala la Pokédex en tu pantalla de inicio para usarla como una app nativa</div>
             <button class="install-btn show" id="install-pwa-btn">⬇ INSTALAR EN MI DISPOSITIVO</button>
             <div style="font-size:9px;color:#666;margin-top:6px;">Si el botón no funciona: en Chrome Android usa "Añadir a pantalla de inicio" desde el menú ⋮</div>`
        }
      </div>
      <div class="opt-group">
        <div class="opt-label">🔑 API KEY — GEMINI</div>
        <div style="font-size:clamp(9px,2.5vw,11px);color:#888;margin-bottom:6px;">Obtén tu clave gratis en <b style="color:#aaa">aistudio.google.com</b></div>
        <div class="api-row">
          <input type="text" id="api-key-input" placeholder="AIzaSy..." value="${safeText(STATE.geminiKey)}">
          <button class="api-save" id="api-save-btn">Guardar</button>
        </div>
        <div style="font-size:9px;color:${STATE.geminiKey?'#44aa44':'#ff6644'};margin-top:6px;">
          ${STATE.geminiKey?'✔ Gemini configurado':'✗ Sin API Key — no se puede escanear'}
        </div>
      </div>
      <div class="opt-group">
        <div class="opt-label">🌍 IDIOMA</div>
        <select><option selected>🇪🇸 Español</option></select>
        <div class="placeholder-msg" style="margin-top:6px">Más idiomas próximamente</div>
      </div>
      <div class="opt-group">
        <div class="opt-label">📊 ESTADÍSTICAS</div>
        <div class="stat-row"><span>Capturados</span><span class="stat-val">${count}</span></div>
        <div class="stat-row"><span>Total Pokédex</span><span class="stat-val">${TOTAL}</span></div>
        <div class="stat-row"><span>Completado</span><span class="stat-val">${(count/TOTAL*100).toFixed(1)}%</span></div>
      </div>
      <div class="opt-group">
        <div class="opt-label">🔊 VOZ</div>
        <div class="placeholder-msg">Selección de voz próximamente</div>
      </div>
      <div class="opt-group">
        <div class="opt-label">🗑️ DATOS</div>
        <button id="clear-btn" style="background:#660000;border:none;border-radius:6px;color:white;font-size:clamp(10px,2.8vw,12px);padding:10px;cursor:pointer;font-family:inherit;width:100%;font-weight:bold">
          Borrar todos los registros
        </button>
      </div>
    </div>`;

  document.getElementById('api-save-btn').onclick=()=>{
    STATE.geminiKey=document.getElementById('api-key-input').value.trim();
    showMsg(STATE.geminiKey?'✔ API Key guardada':'⚠️ Key borrada');
    renderOptions();
  };
  document.getElementById('clear-btn').onclick=()=>openConfirm(
    '¿Borrar todos los Pokémon registrados?\nEsta acción no se puede deshacer.',
    ()=>{ STATE.captured={}; showMsg('🗑️ Datos borrados'); renderOptions(); }
  );

  const installBtn = document.getElementById('install-pwa-btn');
  if (installBtn) {
    installBtn.onclick = async () => {
      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        const choice = await deferredInstallPrompt.userChoice;
        if (choice.outcome === 'accepted') showMsg('✔ Instalando app...');
        deferredInstallPrompt = null;
      } else {
        showMsg('Usa el menú del navegador → "Añadir a pantalla de inicio"', 5000);
      }
    };
  }
}

// ===== CONFIRM =====
let _cb=null;
function openConfirm(msg,cb){ _cb=cb; document.getElementById('confirm-msg').textContent=msg; document.getElementById('confirm-overlay').classList.add('show'); document.getElementById('confirm-ok').onclick=()=>{ closeConfirm(); if(_cb)_cb(); }; }
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('show'); _cb=null; }

// ===== VOZ =====
function speakDesc(text){
  if(!window.speechSynthesis){ showMsg('Síntesis de voz no disponible'); return; }
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES'; u.rate=0.88; u.pitch=1.0;
  window.speechSynthesis.speak(u);
}

showSection('capture');
</script>
